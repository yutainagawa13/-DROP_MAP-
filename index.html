<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>大阪名所マップ</title>

<!-- Leaflet -->
<link rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- GA4（不要なら削除OK） -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-YGD8E8JZJM"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-YGD8E8JZJM');
</script>

<style>
html,body,#map{height:100%;margin:0;}
#map{z-index:0;}

.panel{
  position:fixed;
  top:12px;
  left:12px;
  background:#0f1730;
  color:#fff;
  padding:12px 14px;
  border-radius:12px;
  box-shadow:0 10px 30px rgba(0,0,0,.35);
  z-index:1000;
  font-family:system-ui, sans-serif;
}
.panel h3{
  margin:0 0 8px;
  font-size:14px;
}

.item{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:13px;
  margin:6px 0;
}
.item input{width:16px;height:16px;}
.dot{
  width:12px;
  height:12px;
  border-radius:50%;
}
.leaflet-div-icon.custom-pin {
  background: none;
  border: none;
}

</style>
</head>

<body>
<div id="map"></div>

<div class="panel">
  <h3>カテゴリ</h3>
  <div id="categoryList"></div>
</div>

<script>
/* ===== 設定 ===== */
const BASE_PATH = "/-DROP_MAP-"; // 必要なら変更
const withBasePath = p => (BASE_PATH||"") + (p.startsWith("/")?p:"/"+p);

/* カテゴリ色（必要に応じて調整） */
function getColor(id){
  return {
    history:"#7c2d12",
    view:"#60a5fa",
    food:"#f472b6",
    nature:"#34d399"
  }[id] || "#999";
}

/* ===== Map ===== */
const map = L.map("map").setView([34.6937,135.5023],12);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{
  maxZoom:19,
  attribution:"© OpenStreetMap contributors"
}).addTo(map);

/* ===== GA送信 ===== */
function track(evt){
  if(typeof gtag==="function"){
    gtag("event", evt.type, {
      category: evt.category,
      selected: evt.selected,
      event_ts: evt.ts
    });
  }
}
  function createPinIcon(color){
  return L.divIcon({
    className: "custom-pin",
    html: `
      <svg width="26" height="40" viewBox="0 0 24 36" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 0C5.4 0 0 5.4 0 12c0 9 12 24 12 24s12-15 12-24C24 5.4 18.6 0 12 0z"
              fill="${color}"/>
        <circle cx="12" cy="12" r="5" fill="white"/>
      </svg>
    `,
    iconSize: [26, 40],
    iconAnchor: [13, 40],
    popupAnchor: [0, -34]
  });
}

/* ===== Init ===== */
(async()=>{
  // ★ pois.json ではなく spot.json を読む
  const res = await fetch(withBasePath("spot.json")).then(r=>r.json());

  const categories = res.categories; // ← JSONそのまま
  const pois = res.pois;

  // カテゴリ別レイヤー作成
  const layers = {};
  categories.forEach(c=>{
    layers[c.id] = L.layerGroup().addTo(map);
  });

  // マーカー配置
  pois.forEach(p=>{
    if(!layers[p.category]) return;
    const color = getColor(p.category);

const marker = L.marker(
  [p.lat, p.lng],
  { icon: createPinIcon(color) }
)
.bindPopup(`<b>${p.name}</b><br>${p.desc || ""}`)
.addTo(layers[p.category]);

marker.on("click", () => {
  track({
    type: "poi_click",
    category: p.category,
    poi_id: p.id,
    poi_name: p.name,
    ts: new Date().toISOString()
  });
});

  // UI生成（チェック即時反映）
  const wrap = document.getElementById("categoryList");
  const selected = new Set(categories.map(c=>c.id)); // 初期：全表示

  categories.forEach(c=>{
    const row = document.createElement("label");
    row.className = "item";
    row.innerHTML = `
      <input type="checkbox" checked>
      <span class="dot" style="background:${getColor(c.id)}"></span>
      <span>${c.label}</span>
    `;

    row.querySelector("input").addEventListener("change", e=>{
      if(e.target.checked){
        selected.add(c.id);
        map.addLayer(layers[c.id]);
      }else{
        selected.delete(c.id);
        map.removeLayer(layers[c.id]);
      }

      track({
        type: e.target.checked ? "category_select" : "category_deselect",
        category: c.id,
        selected: [...selected].join(","),
        ts: new Date().toISOString()
      });
    });

    wrap.appendChild(row);
  });
})();

</script>
</body>
</html>
