<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1, viewport-fit=cover" />
  <title>大阪名所マップ（カテゴリ選択）</title>

  <!-- Leaflet (CDN) -->
  <link rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin=""/>
  <script
        src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""></script>

  <!-- GA4（必要ならON。画面ログは出さない） -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-YGD8E8JZJM"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){ dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-YGD8E8JZJM');
  </script>

  <style>
    :root{
      --bg:#0b1220;
      --panel:#0f1730;
      --panel2:#111c3a;
      --text:#eaf0ff;
      --muted:#9fb0d0;
      --line:#25335d;
      --accent:#3f5bd8;
      --chip:#142148;
      --chipOn:#2a3f86;
      --shadow:0 14px 40px rgba(0,0,0,.35);
      --r:16px;
      --safeTop: env(safe-area-inset-top, 0px);
      --safeBottom: env(safe-area-inset-bottom, 0px);
      --safeLeft: env(safe-area-inset-left, 0px);
      --safeRight: env(safe-area-inset-right, 0px);
    }
    html,body{height:100%; margin:0; background:var(--bg); color:var(--text);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Hiragino Kaku Gothic ProN",
                   "Noto Sans JP", "Yu Gothic", "Meiryo", sans-serif;
      overflow:hidden;
    }

    /* Layout */
    .app{height:100%; display:grid; grid-template-columns: 360px 1fr;}
    .side{
      padding: 14px;
      padding-left: calc(14px + var(--safeLeft));
      background: linear-gradient(180deg, rgba(17,28,58,.96), rgba(11,18,32,.92));
      border-right:1px solid var(--line);
      box-shadow: var(--shadow);
      z-index: 1000;
    }
    #map{height:100%; width:100%;}

    /* Card */
    .card{
      background: rgba(255,255,255,.04);
      border:1px solid rgba(37,51,93,.9);
      border-radius: var(--r);
      padding: 12px;
    }
    .h1{font-weight:900; font-size:16px; margin:4px 0 10px;}
    .hint{color:var(--muted); font-size:12px; line-height:1.5; margin-top:8px;}

    /* Desktop category panel (no scroll required) */
    .boxTitle{font-weight:900; margin-bottom:10px;}
    .search{
      width:100%;
      box-sizing:border-box;
      background: rgba(0,0,0,.20);
      border:1px solid rgba(37,51,93,.9);
      color:var(--text);
      padding:10px 12px;
      border-radius: 12px;
      outline:none;
      font-size:13px;
    }
    .actions{display:flex; gap:8px; margin:10px 0 10px;}
    .btn{
      flex:1;
      appearance:none;
      border:1px solid rgba(37,51,93,.9);
      background: rgba(20,33,72,.85);
      color:var(--text);
      padding:10px 10px;
      border-radius: 12px;
      cursor:pointer;
      font-weight:800;
      font-size:12px;
      transition:.15s transform, .15s background, .15s border-color;
      user-select:none;
    }
    .btn:active{transform: scale(.99);}
    .btn.primary{border-color: rgba(63,91,216,.9); background: rgba(42,63,134,.95);}
    .list{margin-top:8px; display:grid; gap:10px;}
    .row{
      display:flex; align-items:center; gap:10px;
      font-size:13px;
    }
    .row input{width:18px; height:18px;}
    .dot{width:14px; height:14px; border-radius:999px; display:inline-block;}
    .label{font-weight:800;}
    .count{margin-left:auto; color:var(--muted); font-size:12px;}

    /* Mobile: hide sidebar, show top chips */
    .topbar{
      display:none;
      position: fixed;
      left:0; right:0; top:0;
      padding: calc(10px + var(--safeTop)) 12px 10px;
      padding-left: calc(12px + var(--safeLeft));
      padding-right: calc(12px + var(--safeRight));
      z-index: 1200;
      background: linear-gradient(180deg, rgba(11,18,32,.92), rgba(11,18,32,.65), rgba(11,18,32,0));
      pointer-events:none;
    }
    .topPanel{
      pointer-events:auto;
      background: rgba(16,26,51,.88);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      border-radius: 18px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      overflow:hidden;
    }
    .topHead{
      padding:10px 12px;
      border-bottom:1px solid rgba(37,51,93,.6);
      display:flex; align-items:center; justify-content:space-between; gap:10px;
    }
    .chipRow{
      display:flex; gap:10px;
      padding:10px 12px;
      overflow-x:auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width:none;
    }
    .chipRow::-webkit-scrollbar{display:none;}
    .chip{
      flex:0 0 auto;
      appearance:none;
      border:1px solid rgba(37,51,93,.9);
      background: var(--chip);
      color:var(--text);
      padding:10px 14px;
      border-radius:999px;
      font-weight:900;
      font-size:13px;
      cursor:pointer;
      user-select:none;
      min-height:40px;
      transition:.15s transform, .15s background, .15s border-color;
    }
    .chip:active{transform: scale(.98);}
    .chip.active{background: var(--chipOn); border-color: rgba(63,91,216,.95);}

    @media (max-width: 820px){
      .app{grid-template-columns: 1fr;}
      .side{display:none;}
      .topbar{display:block;}
    }
  </style>
</head>

<body>
  <div class="app">
    <!-- Desktop sidebar -->
    <aside class="side">
      <div class="h1">大阪名所マップ</div>
      <div class="card">
        <div class="boxTitle">カテゴリ</div>
        <input class="search" id="searchBox" placeholder="カテゴリを絞り込み" />

        <div class="actions">
          <button class="btn" id="btnAll">全選択</button>
          <button class="btn" id="btnNone">全解除</button>
          <button class="btn primary" id="btnApply">範囲更新</button>
        </div>

        <div class="list" id="categoryList"></div>

        <div class="hint">※ <span style="font-weight:800;">pois.json</span>（spots一覧）を絞り込んで表示します。</div>
      </div>
    </aside>

    <div id="map"></div>
  </div>

  <!-- Mobile top chips -->
  <div class="topbar">
    <div class="topPanel">
      <div class="topHead">
        <div style="font-weight:900;">カテゴリ</div>
        <div style="color:var(--muted); font-size:12px;" id="mobileState">ALL</div>
      </div>
      <div class="chipRow" id="mobileChips"></div>
    </div>
  </div>

<script>
/* ===== base path（元HTMLは "/-DROP_MAP-"） ===== */
const BASE_PATH = "/-DROP_MAP-"; // 必要に応じて変更 [2](https://obayashig-my.sharepoint.com/personal/uy2316_obayashi_co_jp/Documents/Microsoft%20Copilot%20Chat%20%E3%83%95%E3%82%A1%E3%82%A4%E3%83%AB/index_GA%E7%94%A8.html)

const CATEGORY_CONFIG = {
  history: { label: "歴史・文化", color: "#f59e0b" },
  view:    { label: "展望・近代建築", color: "#60a5fa" },
  food:    { label: "グルメ・市場",  color: "#f472b6" },
  nature:  { label: "自然・公園",    color: "#34d399" }
};

function withBasePath(path){
  const p = path.startsWith("/") ? path : ("/" + path);
  return (BASE_PATH || "") + p;
}

async function loadData(){
  try{
    const res = await fetch(withBasePath("pois.json"), { cache:"no-store" });
    if(!res.ok) throw new Error("HTTP " + res.status);
    return await res.json();
  }catch(e){
    console.warn("pois.jsonの読み込みに失敗。埋め込みデータを使用します。理由:", e);
    return POIS_INLINE;
  }
}

function escapeHtml(str){
  return String(str)
    .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
    .replaceAll('"',"&quot;").replaceAll("'","&#39;");
}

/* ===== GA4送信（画面ログなし） ===== */
function track(evt){
  if (typeof gtag === "function") {
    gtag("event", evt.type, {
      category: evt.category ?? null,
      poi_id: evt.poiId ?? null,
      poi_name: evt.poiName ?? null,
      selected: Array.isArray(evt.selected) ? evt.selected.join(",") : null,
      event_ts: evt.ts ?? null
    });
  }
}

/* ===== Leaflet map ===== */
const map = L.map("map", { zoomControl:false }).setView([34.6937, 135.5023], 12);
L.control.zoom({ position:"bottomright" }).addTo(map);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  maxZoom: 19, attribution: "© OpenStreetMap contributors"
}).addTo(map);

const layersByCategory = {
  history: L.layerGroup().addTo(map),
  view:    L.layerGroup().addTo(map),
  food:    L.layerGroup().addTo(map),
  nature:  L.layerGroup().addTo(map)
};

function createPinIcon(color){
  return L.divIcon({
    className:"",
    html:`<svg width="28" height="42" viewBox="0 0 24 36" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 0C5.4 0 0 5.4 0 12c0 9 12 24 12 24s12-15 12-24C24 5.4 18.6 0 12 0z" fill="${color}"/>
      <circle cx="12" cy="12" r="5" fill="white"/>
    </svg>`,
    iconSize:[28,42], iconAnchor:[14,42], popupAnchor:[0,-36]
  });
}

function makeMarker(poi){
  const conf = CATEGORY_CONFIG[poi.category] || { color:"#94a3b8" };
  const marker = L.marker([poi.lat, poi.lng], { icon: createPinIcon(conf.color) });
  marker.bindPopup(`
    <div style="font-weight:900; font-size:14px; margin-bottom:4px;">${escapeHtml(poi.name)}</div>
    <div style="font-size:12px; color:#475569;">カテゴリ：${escapeHtml(CATEGORY_CONFIG[poi.category]?.label || poi.category)}</div>
  `);
  marker.on("click", () => {
    track({ type:"poi_click", poiId: poi.id, poiName: poi.name, category: poi.category, ts: new Date().toISOString() });
  });
  return marker;
}

let allPois = [];
let categories = [];
let selected = new Set();   // 複数選択。空=ALL
let pending = new Set();    // PC側：チェック状態（範囲更新でselectedへ反映）

function renderPois(pois){
  Object.values(layersByCategory).forEach(g => g.clearLayers());
  pois.forEach(p => layersByCategory[p.category]?.addLayer(makeMarker(p)));
  applyFilter();
}

function applyFilter(){
  if(selected.size === 0){
    Object.values(layersByCategory).forEach(layer => { if(!map.hasLayer(layer)) layer.addTo(map); });
  }else{
    Object.entries(layersByCategory).forEach(([cat, layer]) => {
      if(selected.has(cat)){ if(!map.hasLayer(layer)) layer.addTo(map); }
      else { if(map.hasLayer(layer)) map.removeLayer(layer); }
    });
  }
  // mobile state
  const mobileState = document.getElementById("mobileState");
  if(mobileState){
    mobileState.textContent = (selected.size===0) ? "ALL" : Array.from(selected).map(c => CATEGORY_CONFIG[c]?.label || c).join(", ");
  }
}

/* ===== PC panel ===== */
function buildCategoryList(){
  const list = document.getElementById("categoryList");
  const q = (document.getElementById("searchBox").value || "").trim().toLowerCase();

  list.innerHTML = "";
  const filtered = categories.filter(c => {
    const label = (CATEGORY_CONFIG[c.id]?.label || c.label || c.id).toLowerCase();
    return !q || label.includes(q) || c.id.toLowerCase().includes(q);
  });

  filtered.forEach(c => {
    const conf = CATEGORY_CONFIG[c.id] || { color:"#94a3b8", label:c.label || c.id };
    const row = document.createElement("label");
    row.className = "row";

    const cb = document.createElement("input");
    cb.type = "checkbox";
    cb.checked = pending.has(c.id);
    cb.addEventListener("change", () => {
      if(cb.checked) pending.add(c.id);
      else pending.delete(c.id);
    });

    const dot = document.createElement("span");
    dot.className = "dot";
    dot.style.background = conf.color;

    const txt = document.createElement("span");
    txt.className = "label";
    txt.textContent = conf.label;

    const cnt = document.createElement("span");
    cnt.className = "count";
    cnt.textContent = String(allPois.filter(p => p.category === c.id).length);

    row.appendChild(cb);
    row.appendChild(dot);
    row.appendChild(txt);
    row.appendChild(cnt);
    list.appendChild(row);
  });
}

document.getElementById("searchBox").addEventListener("input", buildCategoryList);

document.getElementById("btnAll").addEventListener("click", () => {
  pending = new Set(categories.map(c => c.id));
  buildCategoryList();
});

document.getElementById("btnNone").addEventListener("click", () => {
  pending.clear();
  buildCategoryList();
});

document.getElementById("btnApply").addEventListener("click", () => {
  // pending → selected 反映
  selected = new Set(pending);

  // GAイベント（カテゴリ更新）
  track({
    type:"category_select",
    category: (selected.size===0 ? "ALL" : "MULTI"),
    selected: Array.from(selected),
    ts: new Date().toISOString()
  });

  applyFilter();
});

/* ===== Mobile chips ===== */
function buildMobileChips(){
  const wrap = document.getElementById("mobileChips");
  wrap.innerHTML = "";

  const mk = (id, label) => {
    const b = document.createElement("button");
    b.className = "chip";
    b.type = "button";
    b.dataset.cat = id;
    b.textContent = label;
    b.style.touchAction = "manipulation";
    b.addEventListener("click", () => {
      if(id === "ALL"){
        selected.clear();
      }else{
        if(selected.has(id)) selected.delete(id);
        else selected.add(id);
      }
      // PC側のチェック状態も同期
      pending = new Set(selected);

      // GA送信
      track({
        type: selected.has(id) ? "category_select" : "category_deselect",
        category: id === "ALL" ? "ALL" : id,
        selected: Array.from(selected),
        ts: new Date().toISOString()
      });

      updateMobileActive();
      buildCategoryList();
      applyFilter();
    });
    return b;
  };

  wrap.appendChild(mk("ALL", "すべて"));
  categories.forEach(c => {
    const label = CATEGORY_CONFIG[c.id]?.label || c.label || c.id;
    wrap.appendChild(mk(c.id, label));
  });

  updateMobileActive();
}

function updateMobileActive(){
  document.querySelectorAll(".chip[data-cat]").forEach(b => {
    const cat = b.dataset.cat;
    const active = (selected.size===0 && cat==="ALL") || selected.has(cat);
    b.classList.toggle("active", active);
  });
}

/* ===== Inline fallback ===== */
const POIS_INLINE = {
  "categories": [
    { "id": "history", "label": "歴史・文化" },
    { "id": "view",    "label": "展望・近代建築" },
    { "id": "food",    "label": "グルメ・市場" },
    { "id": "nature",  "label": "自然・公園" }
  ],
  "pois": [
    { "id":"osaka_castle","name":"大阪城（大坂城）","category":"history","lat":34.6873778,"lng":135.5258444 },
    { "id":"shitennoji","name":"四天王寺","category":"history","lat":34.6539,"lng":135.51645 },
    { "id":"umeda_sky_building","name":"梅田スカイビル（空中庭園展望台）","category":"view","lat":34.705307,"lng":135.489639 },
    { "id":"abeno_harukas","name":"あべのハルカス","category":"view","lat":34.646075,"lng":135.513387 },
    { "id":"tsutenkaku","name":"通天閣","category":"view","lat":34.6525361,"lng":135.506325 },
    { "id":"dotonbori","name":"道頓堀","category":"food","lat":34.6686694,"lng":135.5031056 },
    { "id":"kuromon_market","name":"黒門市場","category":"food","lat":34.6653442,"lng":135.506271 },
    { "id":"kaiyukan","name":"海遊館","category":"nature","lat":34.654472,"lng":135.428889 },
    { "id":"nakanoshima_park","name":"中之島公園","category":"nature","lat":34.69306,"lng":135.506417 }
  ]
};

(async function init(){
  const data = await loadData();
  categories = data.categories || [];
  allPois = data.pois || [];

  // 初期：ALL（selected空）・PC側 pendingもALL扱い＝全チェック
  pending = new Set(categories.map(c => c.id));
  // ※ “範囲更新”押すまで selected は変えない → 画像の挙動に寄せる
  // ただし初回は全表示なので selected は空のままにしておく（ALL表示）

  renderPois(allPois);
  buildCategoryList();
  buildMobileChips();
  applyFilter();

  track({ type:"page_view", ts: new Date().toISOString() });
})();
</script>
</body>
</html>
``
