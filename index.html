<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>大阪名所マップ</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- GA4 -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-YGD8E8JZJM"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){ dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-YGD8E8JZJM');
  </script>

  <style>
    html, body, #map { height:100%; margin:0; }

    .panel{
      position:fixed;
      top:12px;
      left:12px;
      background:#0f1730;
      color:#fff;
      padding:12px 14px;
      border-radius:12px;
      box-shadow:0 10px 30px rgba(0,0,0,.35);
      z-index:1000;
      min-width:220px;
      font-family:sans-serif;
    }
    .panel h3{
      margin:0 0 8px;
      font-size:14px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }
    .item{
      display:flex;
      align-items:center;
      gap:8px;
      font-size:13px;
      margin:6px 0;
      cursor:pointer;
    }
    .item input{ width:16px; height:16px; }
    .dot{
      width:12px;
      height:12px;
      border-radius:50%;
    }
    /* ◎（すべて用）だけ追加 */
    .dot-all{
      width:12px;
      height:12px;
      border:2px solid #aaa;
      border-radius:50%;
      position:relative;
      background:none !important;
    }
    .dot-all::after{
      content:"";
      width:6px;
      height:6px;
      background:#aaa;
      border-radius:50%;
      position:absolute;
      top:50%;
      left:50%;
      transform:translate(-50%, -50%);
    }
    #categoryList.hidden{ display:none; }

    .leaflet-div-icon.custom-pin{
      background:none;
      border:none;
    }

    /* =========================================================
       ★ 選択ピン：リング（波紋）アニメーション
       ========================================================= */
    .pin-wrap{
      position:relative;
      width:var(--w);
      height:var(--h);
      transform:translateZ(0);
      pointer-events:none; /* アイコン自体はLeafletが拾うのでOK */
    }
    .pin-ring{
      position:absolute;
      left:50%;
      top:var(--ringTop);
      width:var(--ringSize);
      height:var(--ringSize);
      border-radius:999px;
      border:2px solid rgba(255,255,255,.9);
      transform:translate(-50%, -50%) scale(.6);
      opacity:0;
      pointer-events:none;
      box-sizing:border-box;
      filter:drop-shadow(0 2px 2px rgba(0,0,0,.25));
    }
    .pin-wrap.is-selected .pin-ring.r1{
      animation:pinRipple 1.4s ease-out infinite;
    }
    .pin-wrap.is-selected .pin-ring.r2{
      animation:pinRipple 1.4s ease-out infinite;
      animation-delay:.7s;
    }
    @keyframes pinRipple{
      0%   { transform:translate(-50%, -50%) scale(.6); opacity:.75; }
      100% { transform:translate(-50%, -50%) scale(2.1); opacity:0; }
    }

    /* =========================================================
       ★ body直下に出す「ピン説明カード」(カテゴリパネルより上に固定)
       ========================================================= */
    #spotFloating{
      position:fixed;
      inset:0;
      z-index:3000;
      pointer-events:none;
    }
    #spotCard{
      position:fixed;
      left:-9999px;
      top:-9999px;
      width:160px;
      max-height:260px;
      overflow-y:auto;
      overflow-x:hidden;     /* 横スクロール禁止 */
      -webkit-overflow-scrolling:touch;
      background:#fff;
      border-radius:12px;
      box-shadow:0 12px 40px rgba(0,0,0,.35);
      pointer-events:auto;
      font-family:sans-serif;
      box-sizing:border-box;
    }
    #spotCard.hidden{ display:none; }

    #spotCard.is-interacting{
      opacity:0.35;
      pointer-events:none;
    }

    #spotCard::after{
      content:"";
      position:absolute;
      left:50%;
      bottom:-8px;
      transform:translateX(-50%);
      width:0;height:0;
      border-left:8px solid transparent;
      border-right:8px solid transparent;
      border-top:8px solid #fff;
      filter:drop-shadow(0 6px 6px rgba(0,0,0,.15));
    }

    .spot-thumb{
      width:100%;
      height:90px;
      object-fit:cover;
      display:block;
      border-radius:12px 12px 0 0;
      background:#f2f2f2;
    }
    .no-image{
      width:100%;
      height:90px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#f2f2f2;
      color:#888;
      font-size:12px;
      border-radius:12px 12px 0 0;
      user-select:none;
    }

    .spot-body{
      padding:10px 10px 12px;
    }
    .spot-body h4{
      font-size:13px;
      margin:0 0 6px;
      line-height:1.25;
    }
    .spot-body p{
      font-size:10.5px;
      line-height:1.55;
      margin:0 0 8px;
      white-space:pre-wrap;
      overflow-wrap:anywhere;
      word-break:break-word;
    }
    .spot-body a{
      display:inline-block;
      max-width:100%;
      overflow-wrap:anywhere;
      word-break:break-word;
      font-size:10.5px;
      line-height:1.4;
    }
  </style>
</head>

<body>
  <div id="map"></div>

  <div class="panel">
    <h3>
      <span>カテゴリ</span>
      <button id="toggleCategory">－</button>
    </h3>
    <div id="categoryList"></div>
  </div>

  <div id="spotFloating">
    <div id="spotCard" class="hidden">
      <div id="spotCardInner"></div>
    </div>
  </div>

  <script>
    const BASE_PATH = "/-DROP_MAP-";
    const withBasePath = p => BASE_PATH + "/" + p;

    /* ===== Map ===== */
    const map = L.map("map").setView([34.6937, 135.5023], 12);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", { maxZoom:19 }).addTo(map);

    /* ===== GA ===== */
    function track(evt){
      if(typeof gtag === "function"){
        gtag("event", evt.type, evt);
      }
    }

    /* ===== ピン（リング付き） ===== */
    function createPinIcon(color, selected=false){
      const w = selected ? 32 : 26;
      const h = selected ? 48 : 40;
      const anchorX = Math.round(w/2);
      const anchorY = h;

      // リングの位置/サイズ（ピンの丸い部分の中心あたり）
      const ringSize = Math.round(w * 1.05);  // リング直径
      const ringTop  = Math.round(h * 0.30);  // 上からの位置

      const shadow = selected ? 'filter="drop-shadow(0 3px 6px rgba(0,0,0,.45))"' : '';
      const stroke = selected ? 'stroke="#ffffff" stroke-width="1.2"' : '';

      return L.divIcon({
        className:"custom-pin",
        html:`
          <div class="pin-wrap ${selected ? "is-selected" : ""}"
               style="--w:${w}px;--h:${h}px;--ringSize:${ringSize}px;--ringTop:${ringTop}px;">
            <span class="pin-ring r1"></span>
            <span class="pin-ring r2"></span>
            <svg ${shadow} width="${w}" height="${h}" viewBox="0 0 24 36">
              <path d="M12 0C5.4 0 0 5.4 0 12c0 9 12 24 12 24s12-15 12-24C24 5.4 18.6 0 12 0z"
                fill="${color}" ${stroke}/>
              <circle cx="12" cy="12" r="5" fill="white"/>
            </svg>
          </div>
        `,
        iconSize:[w,h],
        iconAnchor:[anchorX, anchorY]
      });
    }

    /* ===== 説明カード制御 ===== */
    const spotCard = document.getElementById("spotCard");
    const spotCardInner = document.getElementById("spotCardInner");
    const panelEl = document.querySelector(".panel");

    let currentLatLng = null;
    let currentMarker = null;
    let currentMarkerColor = null;

    function escapeHtml(str){
      return (str ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    // 説明文内URLを自動リンク化（http/https）
    function linkify(text){
