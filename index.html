<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1, viewport-fit=cover" />
  <title>大阪名所マップ（カテゴリ選択）</title>

  <!-- Leaflet (CDN) -->
  <link rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin=""/>
  <script
        src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""></script>

  <!-- Google tag (gtag.js) : 必要ならON（ログ表示はしないがGA送信は可） -->
  <!-- 元ファイルに合わせて Measurement ID を維持 -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-YGD8E8JZJM"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){ dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-YGD8E8JZJM');
  </script>

  <style>
    :root{
      --bg:#0b1220;
      --panel:#101a33;
      --muted:#9fb0d0;
      --text:#eaf0ff;
      --line:#25335d;
      --chip:#142148;
      --chipOn:#2a3f86;
      --shadow: 0 10px 30px rgba(0,0,0,.35);
      --radius: 16px;
      --safeTop: env(safe-area-inset-top, 0px);
      --safeBottom: env(safe-area-inset-bottom, 0px);
    }
    html,body{
      height:100%;
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Hiragino Kaku Gothic ProN",
                   "Noto Sans JP", "Yu Gothic", "Meiryo", sans-serif;
      overflow:hidden;
    }

    /* map full screen */
    #map{ height:100svh; width:100vw; }

    /* Top overlay (mobile-first) */
    .topbar{
      position: fixed;
      left:0; right:0; top:0;
      padding: calc(10px + var(--safeTop)) 12px 10px;
      z-index: 1000;
      background: linear-gradient(180deg, rgba(11,18,32,.92), rgba(11,18,32,.70), rgba(11,18,32,0));
      pointer-events:none; /* allow map gestures except inside panels */
    }
    .panel{
      pointer-events:auto;
      background: rgba(16,26,51,.88);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      border-radius: 18px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      overflow:hidden;
    }
    .panelHead{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding: 10px 12px;
      border-bottom: 1px solid rgba(37,51,93,.6);
    }
    .title{
      font-weight:800;
      letter-spacing:.02em;
      font-size:14px;
      line-height:1.2;
    }
    .sub{
      color:var(--muted);
      font-size:12px;
      line-height:1.4;
    }
    .meta{
      display:flex;
      gap:8px;
      align-items:center;
      color:var(--muted);
      font-size:12px;
      white-space:nowrap;
    }
    .pill{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:6px 10px;
      border:1px solid rgba(37,51,93,.8);
      border-radius:999px;
      background: rgba(0,0,0,.18);
    }
    .dot{ width:10px; height:10px; border-radius:999px; display:inline-block; }

    /* Category chips (thumb friendly) */
    .chipRow{
      display:flex;
      gap:10px;
      padding: 10px 12px;
      overflow-x:auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width:none;
    }
    .chipRow::-webkit-scrollbar{ display:none; }

    .chip{
      flex:0 0 auto;
      appearance:none;
      border:1px solid rgba(37,51,93,.9);
      background: var(--chip);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 999px;
      font-weight: 750;
      font-size: 13px;
      cursor:pointer;
      user-select:none;
      transition: .15s transform, .15s background, .15s border-color;
      min-height: 40px; /* touch target */
    }
    .chip:active{ transform: scale(.98); }
    .chip.active{
      background: var(--chipOn);
      border-color: #3f5bd8;
    }
    .chip.all{
      background: rgba(255,255,255,.08);
    }

    /* Legend (collapsible on small screens) */
    details.legendBox{
      pointer-events:auto;
      position: fixed;
      left:12px;
      right:12px;
      bottom: calc(12px + var(--safeBottom));
      z-index: 1000;
    }
    details.legendBox > summary{
      list-style:none;
      cursor:pointer;
      user-select:none;
      padding: 12px 14px;
      border-radius: 18px;
      border:1px solid var(--line);
      background: rgba(16,26,51,.88);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      font-weight:800;
      font-size:13px;
    }
    details.legendBox > summary::-webkit-details-marker{ display:none; }
    .legendBody{
      margin-top:10px;
      padding: 10px 12px 12px;
      border-radius: 18px;
      border:1px solid var(--line);
      background: rgba(16,26,51,.88);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .legendGrid{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
    }

    /* Desktop: make topbar narrower like a nice card */
    @media (min-width: 900px){
      .topbar{
        left:16px; right:auto;
        width: 420px;
        padding: 16px 0 0;
        background: none;
        pointer-events:none;
      }
      .topbar .panel{ pointer-events:auto; }
      details.legendBox{
        left:16px;
        right:auto;
        width: 420px;
      }
    }
  </style>
</head>

<body>
  <div id="map"></div>

  <!-- Mobile-friendly category UI (top overlay) -->
  <div class="topbar">
    <div class="panel">
      <div class="panelHead">
        <div>
          <div class="title">大阪名所マップ</div>
          <div class="sub">カテゴリを選ぶと該当スポットだけ表示</div>
        </div>
        <div class="meta">
          <span class="pill">
            <span class="dot" id="currentDot" style="background:#94a3b8"></span>
            <span id="currentCategory">ALL</span>
          </span>
        </div>
      </div>
      <div class="chipRow" id="categoryChips"></div>
    </div>
  </div>

  <!-- Legend (bottom, collapsible) -->
  <details class="legendBox">
    <summary>凡例（タップで開閉） <span style="color:var(--muted); font-weight:700;">▲</span></summary>
    <div class="legendBody">
      <div class="legendGrid" id="legend"></div>
    </div>
  </details>

<script>
/* ============================
  http 用ベースパス設定
  - ローカル: "" のままでOK
  - GitHub Pages(Project): "/リポジトリ名" にすると安定
  例: const BASE_PATH = "/osaka-map";
  元ファイルは "/-DROP_MAP-" でした
============================ */
const BASE_PATH = "/-DROP_MAP-"; // 必要に応じて変更
const CATEGORY_CONFIG = {
  history: { label: "歴史・文化", color: "#f59e0b" },
  view:    { label: "展望・近代建築", color: "#60a5fa" },
  food:    { label: "グルメ・市場",  color: "#f472b6" },
  nature:  { label: "自然・公園",    color: "#34d399" }
};

const map = L.map("map", { zoomControl: false }).setView([34.6937, 135.5023], 12);
L.control.zoom({ position: "bottomright" }).addTo(map);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  maxZoom: 19,
  attribution: "© OpenStreetMap contributors"
}).addTo(map);

const layersByCategory = {
  history: L.layerGroup().addTo(map),
  view:    L.layerGroup().addTo(map),
  food:    L.layerGroup().addTo(map),
  nature:  L.layerGroup().addTo(map)
};

let allPois = [];
let selected = new Set(); // empty means ALL

function withBasePath(path){
  const p = path.startsWith("/") ? path : ("/" + path);
  return (BASE_PATH || "") + p;
}

async function loadData(){
  try{
    const res = await fetch(withBasePath("pois.json"), { cache:"no-store" });
    if(!res.ok) throw new Error("HTTP " + res.status);
    return await res.json();
  }catch(e){
    console.warn("pois.jsonの読み込みに失敗。埋め込みデータを使用します。理由:", e);
    return POIS_INLINE;
  }
}

function escapeHtml(str){
  return String(str)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#39;");
}

/* ====== GA送信（画面ログは一切出さない） ======
   必要なければ、gtag('event',...) ブロックを削除 or コメントアウトでOK
============================================ */
function track(evt){
  // console.logも localStorage も使いません（ログ不要要件）
  if (typeof gtag === "function") {
    gtag("event", evt.type, {
      category: evt.category ?? null,
      poi_id: evt.poiId ?? null,
      poi_name: evt.poiName ?? null,
      selected: Array.isArray(evt.selected) ? evt.selected.join(",") : null,
      event_ts: evt.ts ?? null
    });
  }
}

function createPinIcon(color){
  return L.divIcon({
    className: "",
    html: `
      <svg width="28" height="42" viewBox="0 0 24 36" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 0C5.4 0 0 5.4 0 12c0 9 12 24 12 24s12-15 12-24C24 5.4 18.6 0 12 0z" fill="${color}"/>
        <circle cx="12" cy="12" r="5" fill="white"/>
      </svg>`,
    iconSize: [28,42],
    iconAnchor: [14,42],
    popupAnchor: [0,-36]
  });
}

function makeMarker(poi){
  const conf = CATEGORY_CONFIG[poi.category] || { color:"#94a3b8" };
  const marker = L.marker([poi.lat, poi.lng], { icon: createPinIcon(conf.color) });
  marker.bindPopup(`
    <div style="font-weight:800; font-size:14px; margin-bottom:4px;">
      ${escapeHtml(poi.name)}
    </div>
    <div style="font-size:12px; color:#475569;">
      カテゴリ：${escapeHtml(CATEGORY_CONFIG[poi.category]?.label || poi.category)}
    </div>
  `);
  marker.on("click", () => {
    track({ type:"poi_click", poiId: poi.id, poiName: poi.name, category: poi.category, ts: new Date().toISOString() });
  });
  return marker;
}

function renderPois(pois){
  Object.values(layersByCategory).forEach(g => g.clearLayers());
  pois.forEach(p => {
    const m = makeMarker(p);
    layersByCategory[p.category]?.addLayer(m);
  });
  applyFilter();
  updateUI();
}

function applyFilter(){
  if(selected.size === 0){
    Object.values(layersByCategory).forEach(layer => { if(!map.hasLayer(layer)) layer.addTo(map); });
    return;
  }
  Object.entries(layersByCategory).forEach(([cat, layer]) => {
    if(selected.has(cat)) { if(!map.hasLayer(layer)) layer.addTo(map); }
    else { if(map.hasLayer(layer)) map.removeLayer(layer); }
  });
}

function updateUI(){
  // chip active
  document.querySelectorAll(".chip[data-cat]").forEach(btn => {
    const cat = btn.dataset.cat;
    const isActive = (selected.size === 0 && cat === "ALL") || selected.has(cat);
    btn.classList.toggle("active", isActive);
  });

  // current label + dot
  const label = (selected.size === 0) ? "ALL" : Array.from(selected).map(c => CATEGORY_CONFIG[c]?.label || c).join(", ");
  document.getElementById("currentCategory").textContent = label;

  const dot = document.getElementById("currentDot");
  if(selected.size === 1){
    const only = Array.from(selected)[0];
    dot.style.background = (CATEGORY_CONFIG[only]?.color || "#94a3b8");
  }else{
    dot.style.background = "#94a3b8";
  }
}

function toggleCategory(cat){
  if(cat === "ALL"){
    selected.clear();
    track({ type:"category_select", category:"ALL", selected:[], ts:new Date().toISOString() });
  }else{
    const was = selected.has(cat);
    if(was) selected.delete(cat);
    else selected.add(cat);

    // 0件になったら ALL 扱い
    if(selected.size === 0){
      track({ type:"category_select", category:"ALL", selected:[], ts:new Date().toISOString() });
    }else{
      track({
        type: was ? "category_deselect" : "category_select",
        category: cat,
        selected: Array.from(selected),
        ts: new Date().toISOString()
      });
    }
  }
  applyFilter();
  updateUI();
}

function buildCategoryChips(categories){
  const wrap = document.getElementById("categoryChips");
  wrap.innerHTML = "";

  const mk = (id, label, extraClass="") => {
    const b = document.createElement("button");
    b.className = "chip " + extraClass;
    b.dataset.cat = id;
    b.type = "button";
    b.textContent = label;

    // touch delay を減らす
    b.style.touchAction = "manipulation";

    b.addEventListener("click", () => toggleCategory(id));
    return b;
  };

  wrap.appendChild(mk("ALL", "すべて", "all"));
  categories.forEach(c => wrap.appendChild(mk(c.id, c.label)));
}

function buildLegend(categories){
  const wrap = document.getElementById("legend");
  wrap.innerHTML = "";
  categories.forEach(c => {
    const conf = CATEGORY_CONFIG[c.id];
    const pill = document.createElement("div");
    pill.className = "pill";
    const dot = document.createElement("span");
    dot.className = "dot";
    dot.style.background = conf?.color || "#94a3b8";
    const txt = document.createElement("span");
    txt.textContent = c.label;
    pill.appendChild(dot);
    pill.appendChild(txt);
    wrap.appendChild(pill);
  });
}

/* 埋め込みデータ（保険） */
const POIS_INLINE = {
  "categories": [
    { "id": "history", "label": "歴史・文化" },
    { "id": "view",    "label": "展望・近代建築" },
    { "id": "food",    "label": "グルメ・市場" },
    { "id": "nature",  "label": "自然・公園" }
  ],
  "pois": [
    { "id":"osaka_castle","name":"大阪城（大坂城）","category":"history","lat":34.6873778,"lng":135.5258444,"desc":"大阪を代表する城郭。天守閣と大阪城公園。" },
    { "id":"shitennoji","name":"四天王寺","category":"history","lat":34.6539,"lng":135.51645,"desc":"日本最古級の官寺として知られる古刹。" },
    { "id":"umeda_sky_building","name":"梅田スカイビル（空中庭園展望台）","category":"view","lat":34.705307,"lng":135.489639,"desc":"空中庭園展望台で人気のランドマーク。" },
    { "id":"abeno_harukas","name":"あべのハルカス","category":"view","lat":34.646075,"lng":135.513387,"desc":"日本有数の超高層複合ビル。展望台ハルカス300。" },
    { "id":"tsutenkaku","name":"通天閣","category":"view","lat":34.6525361,"lng":135.506325,"desc":"新世界のランドマーク。展望台と賑わいの街並み。" },
    { "id":"dotonbori","name":"道頓堀","category":"food","lat":34.6686694,"lng":135.5031056,"desc":"大阪ミナミの繁華街。グルメとネオンで有名。" },
    { "id":"kuromon_market","name":"黒門市場","category":"food","lat":34.6653442,"lng":135.506271,"desc":"“浪速の台所”。食べ歩き・鮮魚・青果など。" },
    { "id":"kaiyukan","name":"海遊館","category":"nature","lat":34.654472,"lng":135.428889,"desc":"世界最大級の水族館の一つ。天保山エリア。" },
    { "id":"nakanoshima_park","name":"中之島公園","category":"nature","lat":34.69306,"lng":135.506417,"desc":"都心の水辺公園。バラ園などで有名。" }
  ]
};

(async function init(){
  const data = await loadData();
  allPois = data.pois || [];

  buildCategoryChips(data.categories || []);
  buildLegend(data.categories || []);
  renderPois(allPois);

  // 初回（ページビュー）だけ必要なら送る（不要なら消してOK）
  track({ type:"page_view", ts: new Date().toISOString() });
})();
</script>
</body>
</html>
