<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>大阪名所マップ</title>

<!-- Leaflet -->
<link rel="stylesheet"
 href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- GA4 -->
<script async
 src="https://www.googletagmanager.com/gtag/js?id=G-YGD8E8JZJM"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){ dataLayer.push(arguments); }
gtag('js', new Date());
gtag('config', 'G-YGD8E8JZJM');
</script>

<style>
html, body, #map { height:100%; margin:0; }

.panel{
 position:fixed;
 top:12px;
 left:12px;
 background:#0f1730;
 color:#fff;
 padding:12px 14px;
 border-radius:12px;
 z-index:1000;
}

.item{
 display:flex;
 align-items:center;
 gap:8px;
 margin:6px 0;
 cursor:pointer;
}

.dot{
 width:12px;
 height:12px;
 border-radius:50%;
}

#categoryList.hidden{ display:none; }
.leaflet-div-icon{ background:none;border:none; }
</style>
</head>

<body>

<div id="map"></div>

<div class="panel">
  <h3>
    カテゴリ
    <button id="toggleCategory">－</button>
  </h3>
  <div id="categoryList"></div>
</div>

<script>
const BASE_PATH = "/-DROP_MAP-";
const withBasePath = p => BASE_PATH + "/" + p;

/* ===== Map ===== */
const map = L.map("map").setView([34.6937,135.5023],12);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{
 maxZoom:19
}).addTo(map);

/* ===== GA共通 ===== */
function track(evt){
  if(typeof gtag==="function"){
    gtag("event", evt.type, evt);
  }
}

(async () => {

  const data = await fetch(withBasePath("pois.json")).then(r=>r.json());
  const categories = data.categories;
  const pois = data.pois;

  /* ===== レイヤー ===== */
  const layers = {};
  categories.forEach(c=>{
    layers[c.category_id] = L.layerGroup();
  });

  /* ===== マーカー ===== */
  pois.forEach(p=>{
    const catId = p.category.category_id;

    const marker = L.marker([
      p.spot.latitude,
      p.spot.longitude
    ]).addTo(layers[catId]);

    // ✅ POIクリックログ
    marker.on("click", ()=>{
      track({
        type:"poi_click",
        event_id:p.event_id,
        event_name:p.event_name,
        category_id:catId,
        category_name:p.category.category_name
      });
    });
  });

  const wrap = document.getElementById("categoryList");

  /* =============================
     ロジック（初期処理とは完全分離）
     ============================= */

  function hideAll(){
    Object.values(layers).forEach(l=>map.removeLayer(l));
  }

  function showAll(){
    Object.values(layers).forEach(l=>map.addLayer(l));
  }

  function resetCheck(){
    document.querySelectorAll("#categoryList input")
      .forEach(cb=>cb.checked=false);
  }

  /* 🔵 GA送信用フラグ */
  let isFirst = true;

  function selectAll(){
    hideAll();
    showAll();
    resetCheck();
    allCheckbox.checked = true;

    // ✅ GA（初回除外）
    if(!isFirst){
      track({
        type:"category_select",
        category_id:"all",
        category_name:"すべて"
      });
    }
  }

  function selectCategory(catId, checkbox, catName){
    hideAll();
    map.addLayer(layers[catId]);
    resetCheck();
    checkbox.checked = true;

    // ✅ GA
    track({
      type:"category_select",
      category_id:catId,
      category_name:catName
    });
  }

  /* =============================
     UI
     ============================= */

  /* --- すべて --- */
  const allRow = document.createElement("label");
  allRow.className="item";
  allRow.innerHTML=`
    <input type="checkbox">
    <span class="dot" style="background:#ccc"></span>
    <span>すべて</span>
  `;
  const allCheckbox = allRow.querySelector("input");

  // ✅ イベント
  allCheckbox.addEventListener("change", ()=>{
    selectAll();
    isFirst = false;
  });

  wrap.appendChild(allRow);

  /* --- 個別 --- */
  categories.forEach(c=>{
    const row = document.createElement("label");
    row.className="item";

    row.innerHTML=`
      <input type="checkbox">
      <span class="dot" style="background:${c.color_code}"></span>
      <span>${c.category_name}</span>
    `;

    const checkbox = row.querySelector("input");
    checkbox.addEventListener("change", ()=>{
      selectCategory(c.category_id, checkbox, c.category_name);
      isFirst = false;
    });

    wrap.appendChild(row);
  });

  /* =============================
     開閉
     ============================= */
  const toggleBtn = document.getElementById("toggleCategory");
  let open=true;

  toggleBtn.addEventListener("click",()=>{
    open=!open;
    wrap.classList.toggle("hidden", !open);
    toggleBtn.textContent = open ? "－" : "＋";
  });

  /* =============================
     ✅ 初期処理（完全独立）
     ============================= */
  selectAll();

})();
</script>

</body>
</html>
