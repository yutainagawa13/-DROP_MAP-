<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>大阪名所マップ</title>

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- GA4 -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-YGD8E8JZJM"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-YGD8E8JZJM');
</script>

<style>
html,body,#map{height:100%;margin:0;}
#map{z-index:0;}

.panel{
  position:fixed;
  top:12px;
  left:12px;
  background:#0f1730;
  color:#fff;
  padding:12px 14px;
  border-radius:12px;
  box-shadow:0 10px 30px rgba(0,0,0,.35);
  z-index:1000;
  font-family:system-ui,sans-serif;
}
.panel h3{margin:0 0 8px;font-size:14px;}

.item{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:13px;
  margin:6px 0;
}
.item input{width:16px;height:16px;}
.dot{width:12px;height:12px;border-radius:50%;}

.leaflet-div-icon.custom-pin{
  background:none;
  border:none;
}
</style>
</head>

<body>
<div id="map"></div>

<div class="panel">
  <h3>カテゴリ</h3>
  <div id="categoryList"></div>
</div>

<script>
/* ===== 設定 ===== */
const BASE_PATH = "/-DROP_MAP-";
const withBasePath = p => BASE_PATH + "/" + p;

/* ===== Map ===== */
const map = L.map("map").setView([34.6937,135.5023],12);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{
  maxZoom:19,
  attribution:"© OpenStreetMap contributors"
}).addTo(map);

/* ===== GA送信 ===== */
function track(evt){
  if(typeof gtag==="function"){
    gtag("event", evt.type, evt);
  }
}

/* ===== SVGピン ===== */
function createPinIcon(color){
  return L.divIcon({
    className:"custom-pin",
    html:`
      <svg width="26" height="40" viewBox="0 0 24 36" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 0C5.4 0 0 5.4 0 12c0 9 12 24 12 24s12-15 12-24C24 5.4 18.6 0 12 0z"
              fill="${color}"/>
        <circle cx="12" cy="12" r="5" fill="white"/>
      </svg>
    `,
    iconSize:[26,40],
    iconAnchor:[13,40],
    popupAnchor:[0,-34]
  });
}

/* ===== Init ===== */
(async()=>{
  const data = await fetch(withBasePath("pois.json")).then(r=>r.json());

  const categories = data.categories;
  const pois = data.pois;

  /* カテゴリ辞書 */
  const catMap = {};
  categories.forEach(c=>{
    catMap[c.category_id] = c;
  });

  /* レイヤー */
  const layers = {};
  categories.forEach(c=>{
    layers[c.category_id] = L.layerGroup().addTo(map);
  });

  /* マーカー */
  pois.forEach(p=>{
    const cat = p.category.category_id;
    if(!layers[cat]) return;

    const marker = L.marker(
      [p.spot.latitude, p.spot.longitude],
      { icon:createPinIcon(p.category.color_code) }
    )
    .bindPopup(`
      <b>${p.event_name}</b><br>
      ${p.description || ""}<br><br>
      <a href="${p.detail_url}" target="_blank">詳細を見る</a>
    `)
    .addTo(layers[cat]);

    marker.on("click",()=>{
      track({
        type:"poi_click",
        event_id:p.event_id,
        category_id:cat
      });
    });
  });

  /* UI */
  const wrap = document.getElementById("categoryList");
  const selected = new Set(categories.map(c=>c.category_id));

  categories.forEach(c=>{
    const row = document.createElement("label");
    row.className="item";
    row.innerHTML=`
      <input type="checkbox" checked>
      <span class="dot" style="background:${c.color_code}"></span>
      <span>${c.category_name}</span>
    `;

    row.querySelector("input").addEventListener("change",e=>{
      if(e.target.checked){
        map.addLayer(layers[c.category_id]);
        selected.add(c.category_id);
      }else{
        map.removeLayer(layers[c.category_id]);
        selected.delete(c.category_id);
      }

      track({
        type:e.target.checked?"category_select":"category_deselect",
        category_id:c.category_id,
        selected:[...selected].join(",")
      });
    });

    wrap.appendChild(row);
  });
})();
</script>
</body>
</html>
