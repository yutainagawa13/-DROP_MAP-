<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Osaka Map</title>

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- GA -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-YGD8E8JZJM"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){ dataLayer.push(arguments); }
gtag('js', new Date());
gtag('config', 'G-YGD8E8JZJM');
</script>

<style>
html, body, #map { height:100%; margin:0; }

/* ===== カテゴリ ===== */
.panel{
  position:fixed;
  top:12px;
  left:12px;
  background:#0f1730;
  color:#fff;
  padding:12px 14px;
  border-radius:12px;
  z-index:1000;
}
.item{
  display:flex;
  gap:8px;
  font-size:13px;
}

/* ===== モーダル ===== */
#spotCard{
  position:fixed;
  width:160px;
  max-height:260px;
  overflow-y:auto;
  overflow-x:hidden;
  background:#fff;
  border-radius:12px;
  box-shadow:0 12px 40px rgba(0,0,0,.35);
}
#spotCard.offscreen{ display:none; }

/* ===== タイトル ===== */
.spot-body h4{
  margin:0 0 6px;
}

/* ★ここが今回変更箇所 */
.spot-body h4 a{
  color:#0000ee;
  text-decoration:underline;
  font-size:18px;
  font-weight:bold;
}

/* ===== 本文 ===== */
.spot-body p{
  font-size:13px;
  line-height:1.55;
}

/* 詳細リンク */
.spot-body a{
  color:#0000ee;
  text-decoration:underline;
}
</style>
</head>

<body>

<div id="map"></div>

<div class="panel">
  <div id="categoryList"></div>
</div>

<div id="spotCard"><div id="spotCardInner"></div></div>

<script>

const map = L.map("map").setView([34.6937,135.5023], 12);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

/* ===== GA ===== */
function track(evt){
  if(typeof gtag === "function"){
    gtag("event", evt.type, evt);
  }
}

/* ===== 修正済 escape ===== */
function escapeHtml(str){
  return (str ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#39;");
}

/* ===== URLリンク化 ===== */
function linkify(text){
  const urlRe = /(https?:\/\/[^\s]+)/g;
  return text.replace(urlRe, url =>
    `<a href="${url}" target="_blank">${url}</a>`
  );
}

/* ===== DOM ===== */
const spotCard = document.getElementById("spotCard");
const spotCardInner = document.getElementById("spotCardInner");

let currentLatLng=null;
let currentMarker=null;
let cardOpened=false;

/* ===== HTML生成 ===== */
function buildCardHtml(p){

  const desc = linkify(escapeHtml(p.description || ""));

  return `
    <div class="spot-body">

      <h4>
        <a class="title-link" href="${p.detail_url}" target="_blank">
          ${escapeHtml(p.event_name)}
        </a>
      </h4>

      <p>${desc}</p>

      <a class="detail-link" href="${p.detail_url}" target="_blank">
        詳細を見る
      </a>

    </div>
  `;
}

/* ===== ログ（全部統合） ===== */
function wireTracking(p){

  // タイトル
  spotCardInner.querySelector(".title-link")?.addEventListener("click", ()=>{
    track({
      type:"title_click",
      event_id:p.event_id,
      event_name:p.event_name,
      category_id:p.category.category_id,
      category_name:p.category.category_name,
      url:p.detail_url
    });
  }, { once:true });

  // 詳細
  spotCardInner.querySelector(".detail-link")?.addEventListener("click", ()=>{
    track({
      type:"detail_click",
      event_id:p.event_id,
      event_name:p.event_name,
      category_id:p.category.category_id,
      category_name:p.category.category_name,
      url:p.detail_url
    });
  }, { once:true });

  // 説明URL（ここが今回追加）
  const links = spotCardInner.querySelectorAll("p a");

  links.forEach(link=>{
    link.addEventListener("click", ()=>{
      track({
        type:"description_link_click",
        event_id:p.event_id,
        event_name:p.event_name,
        category_id:p.category.category_id,
        category_name:p.category.category_name,
        url:link.href
      });
    }, { once:true });
  });

}

/* ===== カード表示 ===== */
function openCard(p, latlng, marker){

  currentLatLng = latlng;
  currentMarker = marker;
  cardOpened = true;

  spotCardInner.innerHTML = buildCardHtml(p);

  // ★ここ忘れると全部壊れる
  wireTracking(p);

  placeCard(latlng);
}

/* ===== 配置 ===== */
function placeCard(latlng){

  const pt = map.latLngToContainerPoint(latlng);
  const h = spotCard.offsetHeight;

  // ★あなたの調整値そのまま
  const offsetTop = 60;
  const offsetBottom = 15;

  let y = pt.y - h - offsetTop;

  if(y < 0) y = pt.y + offsetBottom;

  spotCard.style.left = pt.x + "px";
  spotCard.style.top = y + "px";
}

/* ===== 画面外制御 ===== */
function isInView(latlng){
  const pt = map.latLngToContainerPoint(latlng);
  const size = map.getSize();
  return pt.x>=0 && pt.y>=0 && pt.x<=size.x && pt.y<=size.y;
}

map.on("move zoom", ()=>{

  if(!cardOpened) return;

  if(!isInView(currentLatLng)){
    spotCard.classList.add("offscreen");
  }else{
    spotCard.classList.remove("offscreen");
    placeCard(currentLatLng);
  }
});

/* ===== データ ===== */
(async ()=>{

  const data = await fetch("pois.json").then(r=>r.json());

  data.pois.forEach(p=>{

    const marker = L.marker([p.spot.latitude,p.spot.longitude])
      .addTo(map);

    marker.on("click",(e)=>{

      track({
        type:"poi_click",
        event_id:p.event_id,
        event_name:p.event_name
      });

      openCard(p, e.latlng, marker);
    });
  });

})();
</script>

</body>
</html>
``
