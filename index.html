<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>大阪名所マップ</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- GA4 -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-YGD8E8JZJM"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){ dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-YGD8E8JZJM');
  </script>

  <style>
    html, body, #map { height:100%; margin:0; }

    .panel{
      position:fixed;
      top:12px;
      left:12px;
      background:#0f1730;
      color:#fff;
      padding:12px 14px;
      border-radius:12px;
      box-shadow:0 10px 30px rgba(0,0,0,.35);
      z-index:1000;
      min-width:220px;
      font-family:sans-serif;
    }
    .panel h3{
      margin:0 0 8px;
      font-size:14px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }
    .item{
      display:flex;
      align-items:center;
      gap:8px;
      font-size:13px;
      margin:6px 0;
      cursor:pointer;
    }
    .item input{ width:16px; height:16px; }
    .dot{
      width:12px;
      height:12px;
      border-radius:50%;
    }
    /* ◎（すべて用）だけ追加 */
    .dot-all{
      width:12px;
      height:12px;
      border:2px solid #aaa;
      border-radius:50%;
      position:relative;
      background:none !important;
    }
    .dot-all::after{
      content:"";
      width:6px;
      height:6px;
      background:#aaa;
      border-radius:50%;
      position:absolute;
      top:50%;
      left:50%;
      transform:translate(-50%, -50%);
    }
    #categoryList.hidden{ display:none; }

    .leaflet-div-icon.custom-pin{
      background:none;
      border:none;
    }

    /* ===== ここから：ピン上に出る説明（Popup）を幅160で整える ===== */

    /* カテゴリパネル(1000)より必ず前面に */
    .leaflet-popup-pane { z-index: 3000 !important; }

    /* 余白を詰めてカードっぽく */
    .spot-popup .leaflet-popup-content-wrapper{
      border-radius:12px;
      overflow:hidden;
    }
    .spot-popup .leaflet-popup-content{
      margin:0;              /* Leaflet標準余白を消す */
      width:160px;           /* ★固定幅160 */
    }

    /* スポットカード本体（中だけスクロール） */
    .spot-card{
      width:160px;           /* ★固定幅160 */
      max-height:260px;      /* 高さは画面に応じて。中身はスクロール */
      overflow-y:auto;       /* ★内部スクロール */
      -webkit-overflow-scrolling:touch;
      font-family:sans-serif;
      background:#fff;
      box-sizing:border-box;
    }

    /* 画像：幅160に対して縦長になりすぎないよう調整 */
    .spot-thumb{
      width:100%;
      height:90px;           /* ★見た目改善：コンパクト固定 */
      object-fit:cover;
      display:block;
    }

    .spot-body{
      padding:10px 10px 12px;
    }

    /* タイトル */
    .spot-body h4{
      font-size:13px;        /* ← ここで調整可 */
      margin:0 0 6px;
      line-height:1.25;
    }

    /* 説明文 */
    .spot-body p{
      font-size:10.5px;      /* ← ここで調整可 */
      line-height:1.55;
      margin:0 0 8px;
      white-space:pre-wrap;
    }

    /* ★ URLはみ出し対策（＋文字サイズ） */
    .spot-body a{
      display:inline-block;
      max-width:100%;
      overflow-wrap:anywhere;
      word-break:break-word;
      font-size:10.5px;      /* ← URLだけ変えたい時はここ */
      line-height:1.4;
    }

    /* 閉じる×は残す（任意）。押さなくても他ピン選択可能にしてある */
    .spot-popup .leaflet-popup-close-button{
      padding:6px 8px;
    }
  </style>
</head>

<body>
  <div id="map"></div>

  <div class="panel">
    <h3>
      <span>カテゴリ</span>
      <button id="toggleCategory">－</button>
    </h3>
    <div id="categoryList"></div>
  </div>

  <script>
    const BASE_PATH = "/-DROP_MAP-";
    const withBasePath = p => BASE_PATH + "/" + p;

    /* ===== Map ===== */
    const map = L.map("map").setView([34.6937, 135.5023], 12);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom:19
    }).addTo(map);

    /* ===== GA ===== */
    function track(evt){
      if(typeof gtag === "function"){
        gtag("event", evt.type, evt);
      }
    }

    /* ===== ピン ===== */
    function createPinIcon(color){
      return L.divIcon({
        className:"custom-pin",
        html:`
          <svg width="26" height="40" viewBox="0 0 24 36">
            <path d="M12 0C5.4 0 0 5.4 0 12c0 9 12 24 12 24s12-15 12-24
              C24 5.4 18.6 0 12 0z" fill="${color}"/>
            <circle cx="12" cy="12" r="5" fill="white"/>
          </svg>
        `,
        iconSize:[26,40],
        iconAnchor:[13,40],
        popupAnchor:[0,-34]
      });
    }

    /* ===== Popup HTML ===== */
    function buildPopupHtml(p){
      const thumb = p.thumbnail_url
        ? `<img src="${p.thumbnail_url}" class="spot-thumb" alt="${p.event_name}">`
        : "";
      const desc = (p.description || "");

      return `
        <div class="spot-card">
          ${thumb}
          <div class="spot-body">
            <h4>${p.event_name}</h4>
            <p>${desc}</p>
            <a href="${p.detail_url}" target="_blank" rel="noopener noreferrer">詳細を見る</a>
          </div>
        </div>
      `;
    }

    /* ===== Init ===== */
    (async () => {
      const data = await fetch(withBasePath("pois.json")).then(r => r.json());
      const categories = data.categories;
      const pois = data.pois;

      const layers = {};
      categories.forEach(c => {
        layers[c.category_id] = L.layerGroup();
      });

      pois.forEach(p => {
        const catId = p.category.category_id;

        const marker = L.marker(
          [p.spot.latitude, p.spot.longitude],
          { icon: createPinIcon(p.category.color_code) }
        );

        // ★ ピン上に出す：地図を動かさない（autoPan:false）
        // ★ 他ピンを押せる：新しいピンを押せば自動的に内容が切り替わる（autoClose:true）
        marker.bindPopup(buildPopupHtml(p), {
          className: "spot-popup",
          autoPan: false,       // ★MAPが動かない
          keepInView: false,
          closeButton: true,    // ×は残す（不要なら false でもOK）
          autoClose: true,
          closeOnClick: false,  // 地図タップで閉じたくないならfalse（trueにすれば地図タップで閉じる）
          maxWidth: 160,
          minWidth: 160
        });

        marker.addTo(layers[catId]);

        /* GA送信、ピン選択（クリックでpopup表示） */
        marker.on("click", () => {
          track({
            type:"poi_click",
            event_id:p.event_id,
            event_name:p.event_name,
            category_id:catId,
            category_name:p.category.category_name
          });
          // bindPopupしているのでクリックで自動表示される
        });
      });

      const wrap = document.getElementById("categoryList");
      let isFirst = true;

      function hideAll(){
        Object.values(layers).forEach(l => map.removeLayer(l));
      }
      function showAll(){
        Object.values(layers).forEach(l => map.addLayer(l));
      }
      function resetCheck(){
        document.querySelectorAll("#categoryList input")
          .forEach(cb => cb.checked = false);
      }
      function selectAll(){
        hideAll();
        showAll();
        resetCheck();
        allCheckbox.checked = true;
        if(!isFirst){
          track({
            type:"category_select",
            category_id:"all",
            category_name:"すべて"
          });
        }
      }
      function selectCategory(catId, checkbox, name){
        hideAll();
        map.addLayer(layers[catId]);
        resetCheck();
        checkbox.checked = true;

        track({
          type:"category_select",
          category_id:catId,
          category_name:name
        });
      }

      /* すべてのみ（◎）に表示 */
      const allRow = document.createElement("label");
      allRow.className = "item";
      allRow.innerHTML = `
        <input type="checkbox">
        <span class="dot dot-all"></span>
        <span>すべて</span>
      `;
      const allCheckbox = allRow.querySelector("input");
      allCheckbox.addEventListener("change", () => {
        selectAll();
        isFirst = false;
      });
      wrap.appendChild(allRow);

      /* --- 個別カテゴリ --- */
      categories.forEach(c => {
        const row = document.createElement("label");
        row.className = "item";
        row.innerHTML = `
          <input type="checkbox">
          <span class="dot" style="background:${c.color_code}"></span>
          <span>${c.category_name}</span>
        `;
        const checkbox = row.querySelector("input");
        checkbox.addEventListener("change", () => {
          selectCategory(c.category_id, checkbox, c.category_name);
          isFirst = false;
        });
        wrap.appendChild(row);
      });

      /* --- カテゴリ開閉 --- */
      const toggleBtn = document.getElementById("toggleCategory");
      let open = true;
      toggleBtn.addEventListener("click", () => {
        open = !open;
        wrap.classList.toggle("hidden", !open);
        toggleBtn.textContent = open ? "－" : "＋";
      });

      selectAll();
    })();
  </script>
</body>
</html>
