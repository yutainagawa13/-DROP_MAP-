<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>大阪名所マップ</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- GA4 -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-YGD8E8JZJM"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){ dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-YGD8E8JZJM');
  </script>

  <style>
    html, body, #map { height:100%; margin:0; }

    .panel{
      position:fixed;
      top:12px;
      left:12px;
      background:#0f1730;
      color:#fff;
      padding:12px 14px;
      border-radius:12px;
      box-shadow:0 10px 30px rgba(0,0,0,.35);
      z-index:1000;
      min-width:220px;
      font-family:sans-serif;
    }
    .panel h3{
      margin:0 0 8px;
      font-size:14px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }
    .item{
      display:flex;
      align-items:center;
      gap:8px;
      font-size:13px;
      margin:6px 0;
      cursor:pointer;
    }
    .item input{ width:16px; height:16px; }
    .dot{
      width:12px;
      height:12px;
      border-radius:50%;
    }
    /* ◎（すべて用）だけ追加 */
    .dot-all{
      width:12px;
      height:12px;
      border:2px solid #aaa;
      border-radius:50%;
      position:relative;
      background:none !important;
    }
    .dot-all::after{
      content:"";
      width:6px;
      height:6px;
      background:#aaa;
      border-radius:50%;
      position:absolute;
      top:50%;
      left:50%;
      transform:translate(-50%, -50%);
    }
    #categoryList.hidden{ display:none; }

    .leaflet-div-icon.custom-pin{
      background:none;
      border:none;
    }

    /* =========================================================
       ★ body直下に出す「ピン説明カード」(カテゴリパネルより上に固定)
       ========================================================= */
    #spotFloating{
      position:fixed;
      inset:0;
      z-index:3000;          /* panel(1000)より上 */
      pointer-events:none;   /* ★全面はクリック透過（地図操作できる） */
    }
    #spotCard{
      position:fixed;
      left:-9999px;
      top:-9999px;
      width:180px;           /* ★固定幅160 */
      max-height:300px;      /* カード内スクロール */
      overflow:auto;
      -webkit-overflow-scrolling:touch;
      background:#fff;
      border-radius:12px;
      box-shadow:0 12px 40px rgba(0,0,0,.35);
      pointer-events:auto;   /* ★カード部分だけクリック可能 */
      font-family:sans-serif;
    }
    #spotCard.hidden{ display:none; }

    /* 吹き出しの“しっぽ”（任意） */
    #spotCard::after{
      content:"";
      position:absolute;
      left:50%;
      bottom:-8px;
      transform:translateX(-50%);
      width:0;height:0;
      border-left:8px solid transparent;
      border-right:8px solid transparent;
      border-top:8px solid #fff;
      filter:drop-shadow(0 6px 6px rgba(0,0,0,.15));
    }

    .spot-thumb{
      width:100%;
      height:90px;           /* ★画像を縦長にしない */
      object-fit:cover;
      display:block;
      border-radius:12px 12px 0 0;
    }
    .spot-body{
      padding:10px 10px 12px;
    }
    .spot-body h4{
      font-size:13px;
      margin:0 0 6px;
      line-height:1.25;
    }
    .spot-body p{
      font-size:13px;
      line-height:1.55;
      margin:0 0 8px;
      white-space:pre-wrap;
    }
    .spot-body a{
      display:inline-block;
      max-width:100%;
      overflow-wrap:anywhere;
      word-break:break-word;
      font-size:10.5px;
      line-height:1.4;
    }
  </style>
</head>

<body>
  <div id="map"></div>

  <div class="panel">
    <h3>
      <span>カテゴリ</span>
      <button id="toggleCategory">－</button>
    </h3>
    <div id="categoryList"></div>
  </div>

  <!-- ★ body直下のフローティング説明（地図より上、カテゴリより上） -->
  <div id="spotFloating">
    <div id="spotCard" class="hidden">
      <div id="spotCardInner"></div>
    </div>
  </div>

  <script>
    const BASE_PATH = "/-DROP_MAP-";
    const withBasePath = p => BASE_PATH + "/" + p;

    /* ===== Map ===== */
    const map = L.map("map").setView([34.6937, 135.5023], 12);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom:19
    }).addTo(map);

    /* ===== GA ===== */
    function track(evt){
      if(typeof gtag === "function"){
        gtag("event", evt.type, evt);
      }
    }

    /* ===== ピン ===== */
    function createPinIcon(color){
      return L.divIcon({
        className:"custom-pin",
        html:`
          <svg width="26" height="40" viewBox="0 0 24 36">
            <path d="M12 0C5.4 0 0 5.4 0 12c0 9 12 24 12 24s12-15 12-24
              C24 5.4 18.6 0 12 0z" fill="${color}"/>
            <circle cx="12" cy="12" r="5" fill="white"/>
          </svg>
        `,
        iconSize:[26,40],
        iconAnchor:[13,40]
      });
    }

    /* ===== 説明カード（body直下）制御 ===== */
    const spotCard = document.getElementById("spotCard");
    const spotCardInner = document.getElementById("spotCardInner");

    let currentLatLng = null; // 表示中のピン位置（地図移動に追従させる）

    function buildCardHtml(p){
      const thumb = p.thumbnail_url
        ? `<img src="${p.thumbnail_url}" class="spot-thumb" alt="${p.event_name}">`
        : "";
      const desc = (p.description || "");
      return `
        ${thumb}
        <div class="spot-body">
          <h4>${p.event_name}</h4>
          <p>${desc}</p>
          <a href="${p.detail_url}" target="_blank" rel="noopener noreferrer">詳細を見る</a>
        </div>
      `;
    }

    function placeCardAt(latlng){
      if(!latlng) return;

      // ピンの画面座標（地図コンテナ内）
      const pt = map.latLngToContainerPoint(latlng);
      const rect = map.getContainer().getBoundingClientRect();

      // 「ピン先端の少し上」を基準点にする
      const anchorX = rect.left + pt.x;
      const anchorY = rect.top + pt.y - 12;

      // 一旦表示してサイズ取得
      spotCard.style.left = "0px";
      spotCard.style.top = "0px";
      spotCard.classList.remove("hidden");

      const cardRect = spotCard.getBoundingClientRect();
      const w = cardRect.width;
      const h = cardRect.height;

      // ピンの上に表示（中央寄せ）
      let x = anchorX - (w / 2);
      let y = anchorY - h;

      // 画面はみ出し軽減
      const pad = 6;
      x = Math.max(pad, Math.min(x, window.innerWidth - w - pad));
      y = Math.max(pad, Math.min(y, window.innerHeight - h - pad));

      spotCard.style.left = x + "px";
      spotCard.style.top = y + "px";
    }

    function openCard(p, latlng){
      currentLatLng = latlng;
      spotCardInner.innerHTML = buildCardHtml(p);
      spotCard.scrollTop = 0;
      placeCardAt(latlng);
    }

    function closeCard(){
      currentLatLng = null;
      spotCard.classList.add("hidden");
      spotCard.style.left = "-9999px";
      spotCard.style.top = "-9999px";
    }

    /* ★ 説明カード以外をクリックしたら閉じる（×不要） */
    document.addEventListener("click", (e) => {
      // 次フレームで判定（クリック衝突で即閉じを防止）
      setTimeout(() => {
        if (spotCard.classList.contains("hidden")) return;
        if (spotCard.contains(e.target)) return; // カード内は閉じない
        closeCard();
      }, 0);
    });

    // 地図を動かしたりズームしたときも、表示中のカードを追従
    map.on("move zoom", () => {
      if(currentLatLng && !spotCard.classList.contains("hidden")){
        placeCardAt(currentLatLng);
      }
    });

    /* ===== Init ===== */
    (async () => {
      const data = await fetch(withBasePath("pois.json")).then(r => r.json());
      const categories = data.categories;
      const pois = data.pois;

      const layers = {};
      categories.forEach(c => {
        layers[c.category_id] = L.layerGroup();
      });

      pois.forEach(p => {
        const catId = p.category.category_id;

        const marker = L.marker(
          [p.spot.latitude, p.spot.longitude],
          { icon: createPinIcon(p.category.color_code) }
        ).addTo(layers[catId]);

        // ★クリックでカード表示（mapはパンしない）
        marker.on("click", (e) => {
          track({
            type:"poi_click",
            event_id:p.event_id,
            event_name:p.event_name,
            category_id:catId,
            category_name:p.category.category_name
          });

          openCard(p, e.latlng);

          // ★ document click に伝播させない（他ピン押下はそのまま切替）
          if(e && e.originalEvent){
            e.originalEvent.stopPropagation?.();
          }
        });
      });

      const wrap = document.getElementById("categoryList");
      let isFirst = true;

      function hideAll(){
        Object.values(layers).forEach(l => map.removeLayer(l));
      }
      function showAll(){
        Object.values(layers).forEach(l => map.addLayer(l));
      }
      function resetCheck(){
        document.querySelectorAll("#categoryList input")
          .forEach(cb => cb.checked = false);
      }
      function selectAll(){
        hideAll();
        showAll();
        resetCheck();
        allCheckbox.checked = true;
        if(!isFirst){
          track({
            type:"category_select",
            category_id:"all",
            category_name:"すべて"
          });
        }
      }
      function selectCategory(catId, checkbox, name){
        hideAll();
        map.addLayer(layers[catId]);
        resetCheck();
        checkbox.checked = true;

        track({
          type:"category_select",
          category_id:catId,
          category_name:name
        });
      }

      /* すべてのみ（◎）に表示 */
      const allRow = document.createElement("label");
      allRow.className = "item";
      allRow.innerHTML = `
        <input type="checkbox">
        <span class="dot dot-all"></span>
        <span>すべて</span>
      `;
      const allCheckbox = allRow.querySelector("input");
      allCheckbox.addEventListener("change", () => {
        selectAll();
        isFirst = false;
      });
      wrap.appendChild(allRow);

      /* --- 個別カテゴリ --- */
      categories.forEach(c => {
        const row = document.createElement("label");
        row.className = "item";
        row.innerHTML = `
          <input type="checkbox">
          <span class="dot" style="background:${c.color_code}"></span>
          <span>${c.category_name}</span>
        `;
        const checkbox = row.querySelector("input");
        checkbox.addEventListener("change", () => {
          selectCategory(c.category_id, checkbox, c.category_name);
          isFirst = false;
        });
        wrap.appendChild(row);
      });

      /* --- カテゴリ開閉 --- */
      const toggleBtn = document.getElementById("toggleCategory");
      let open = true;
      toggleBtn.addEventListener("click", () => {
        open = !open;
        wrap.classList.toggle("hidden", !open);
        toggleBtn.textContent = open ? "－" : "＋";
      });

      selectAll();
    })();
  </script>
</body>
</html>
