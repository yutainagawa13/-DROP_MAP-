<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1, viewport-fit=cover" />
  <title>大阪名所マップ</title>

  <!-- Leaflet -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <!-- GA4（必要なければ削除OK） -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-YGD8E8JZJM"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){ dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-YGD8E8JZJM');
  </script>

  <style>
    :root{
      --bg:#0b1220;
      --panel:#0f1730;
      --text:#eaf0ff;
      --muted:#9fb0d0;
      --line:#25335d;
      --shadow:0 14px 40px rgba(0,0,0,.35);
      --r:14px;
      --safeTop: env(safe-area-inset-top, 0px);
      --safeLeft: env(safe-area-inset-left, 0px);
    }
    html,body{
      height:100%;
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto,
        "Hiragino Kaku Gothic ProN","Noto Sans JP","Yu Gothic","Meiryo", sans-serif;
      overflow:hidden;
    }
    #map{height:100%; width:100%;}

    /* ===== Floating panel (top-left) ===== */
    .panel{
      position: fixed;
      top: calc(12px + var(--safeTop));
      left: calc(12px + var(--safeLeft));
      width: min(320px, calc(100vw - 24px));
      z-index: 1200;
      background: rgba(17,28,58,.92);
      border: 1px solid rgba(37,51,93,.95);
      border-radius: var(--r);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      overflow:hidden;
    }
    .head{
      padding:10px 12px;
      font-weight:900;
      border-bottom:1px solid rgba(37,51,93,.6);
      display:flex;
      align-items:center;
      justify-content:space-between;
    }
    .toggle{
      appearance:none;
      border:1px solid rgba(37,51,93,.9);
      background: rgba(20,33,72,.85);
      color:var(--text);
      border-radius:10px;
      padding:6px 10px;
      font-weight:900;
      cursor:pointer;
    }
    .body{ padding:10px 12px 12px; }

    .search{
      width:100%;
      background: rgba(0,0,0,.18);
      border:1px solid rgba(37,51,93,.9);
      color:var(--text);
      padding:10px 12px;
      border-radius:12px;
      font-size:13px;
      outline:none;
    }

    .actions{
      display:flex;
      gap:8px;
      margin:10px 0;
    }
    .btn{
      flex:1;
      border:1px solid rgba(37,51,93,.9);
      background: rgba(20,33,72,.85);
      color:var(--text);
      padding:10px;
      border-radius:12px;
      font-weight:900;
      font-size:12px;
      cursor:pointer;
    }

    .list{
      display:grid;
      gap:10px;
      margin-top:6px;
    }
    .row{
      display:flex;
      align-items:center;
      gap:10px;
      font-size:13px;
    }
    .row input{ width:18px; height:18px; }
    .dot{
      width:14px;
      height:14px;
      border-radius:999px;
      display:inline-block;
    }
    .label{ font-weight:900; }
    .count{
      margin-left:auto;
      color:var(--muted);
      font-size:12px;
    }
    .hint{
      color:var(--muted);
      font-size:12px;
      margin-top:8px;
    }
    .collapsed .body{ display:none; }

    @media (min-width:900px){
      .panel{ width:340px; }
    }
  </style>
</head>

<body>
  <div id="map"></div>

  <!-- Category panel -->
  <div class="panel" id="panel">
    <div class="head">
      <div>カテゴリ</div>
      <button class="toggle" id="btnToggle">−</button>
    </div>

    <div class="body">
      <input class="search" id="searchBox" placeholder="カテゴリを絞り込み" />

      <div class="actions">
        <button class="btn" id="btnAll">全選択</button>
        <button class="btn" id="btnNone">全解除</button>
      </div>

      <div class="list" id="categoryList"></div>
      <div class="hint">※ pois.json（spots一覧）を読み込んで表示します。</div>
    </div>
  </div>

<script>
/* ===== 設定 ===== */
const BASE_PATH = "/-DROP_MAP-";   // 環境に応じて変更
const CATEGORY_CONFIG = {
  history:{ label:"歴史・文化", color:"#f59e0b" },
  view:{ label:"展望・近代建築", color:"#60a5fa" },
  food:{ label:"グルメ・市場", color:"#f472b6" },
  nature:{ label:"自然・公園", color:"#34d399" }
};

/* ===== Utility ===== */
const withBasePath = p => (BASE_PATH||"") + (p.startsWith("/")?p:"/"+p);
const track = evt => {
  if(typeof gtag==="function"){
    gtag("event", evt.type, {
      category: evt.category ?? null,
      selected: evt.selected ?? null,
      event_ts: evt.ts ?? null
    });
  }
};

/* ===== Map ===== */
const map = L.map("map",{zoomControl:false}).setView([34.6937,135.5023],12);
L.control.zoom({position:"bottomright"}).addTo(map);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{
  maxZoom:19, attribution:"© OpenStreetMap contributors"
}).addTo(map);

const layers = {
  history:L.layerGroup().addTo(map),
  view:L.layerGroup().addTo(map),
  food:L.layerGroup().addTo(map),
  nature:L.layerGroup().addTo(map)
};

const pin = c => L.divIcon({
  className:"",
  html:`<svg width="28" height="42" viewBox="0 0 24 36">
    <path d="M12 0C5.4 0 0 5.4 0 12c0 9 12 24 12 24s12-15 12-24C24 5.4 18.6 0 12 0z" fill="${c}"/>
    <circle cx="12" cy="12" r="5" fill="white"/></svg>`,
  iconSize:[28,42], iconAnchor:[14,42]
});

let categories=[], pois=[], selected=new Set();

/* ===== 描画 ===== */
function applyFilter(){
  if(selected.size===0){
    Object.values(layers).forEach(l=>!map.hasLayer(l)&&l.addTo(map));
  }else{
    Object.entries(layers).forEach(([k,l])=>{
      selected.has(k)?(!map.hasLayer(l)&&l.addTo(map)):(map.hasLayer(l)&&map.removeLayer(l));
    });
  }
}

function buildList(){
  const q=(searchBox.value||"").toLowerCase();
  categoryList.innerHTML="";
  categories.filter(c=>{
    const t=(CATEGORY_CONFIG[c.id]?.label||c.id).toLowerCase();
    return !q||t.includes(q);
  }).forEach(c=>{
    const conf=CATEGORY_CONFIG[c.id];
    const row=document.createElement("label");
    row.className="row";
    row.innerHTML=`
      <input type="checkbox" ${selected.has(c.id)?"checked":""}>
      <span class="dot" style="background:${conf.color}"></span>
      <span class="label">${conf.label}</span>
      <span class="count">${pois.filter(p=>p.category===c.id).length}</span>
    `;
    row.querySelector("input").addEventListener("change",e=>{
      e.target.checked?selected.add(c.id):selected.delete(c.id);
      applyFilter();
      track({
        type:e.target.checked?"category_select":"category_deselect",
        category:c.id,
        selected:[...selected].join(","),
        ts:new Date().toISOString()
      });
    });
    categoryList.appendChild(row);
  });
}

/* ===== Events ===== */
btnAll.onclick=()=>{
  selected=new Set(categories.map(c=>c.id));
  applyFilter(); buildList();
};
btnNone.onclick=()=>{
  selected.clear();
  applyFilter(); buildList();
};
searchBox.oninput=buildList;
btnToggle.onclick=()=>{
  panel.classList.toggle("collapsed");
  btnToggle.textContent=panel.classList.contains("collapsed")?"+":"−";
};

/* ===== Init ===== */
(async()=>{
  const res=await fetch(withBasePath("pois.json")).then(r=>r.json());
  categories=res.categories;
  pois=res.pois;

  pois.forEach(p=>{
    L.marker([p.lat,p.lng],{icon:pin(CATEGORY_CONFIG[p.category].color)})
      .bindPopup(p.name)
      .addTo(layers[p.category]);
  });
  buildList();
})();
</script>
</body>
</html>
